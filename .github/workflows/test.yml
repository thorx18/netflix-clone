name: Full-K8S-CI-CD

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker Image (using commit SHA)
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/netflix:${{ github.sha }} .

      # 4️⃣ Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/netflix:${{ github.sha }}

      # 5️⃣ Copy k8s folder to EC2
      - name: Copy Kubernetes Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "k8s/*"
          target: "/home/ubuntu/"

      # 6️⃣ Deploy to Kubernetes
      - name: Apply on Kubernetes
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            kubectl apply -f /home/ubuntu/k8s/deployment_service.yml
            kubectl set image deployment/netflix-clone web=${{ secrets.DOCKER_USERNAME }}/netflix:${{ github.sha }}
            kubectl rollout status deployment/netflix-clone
