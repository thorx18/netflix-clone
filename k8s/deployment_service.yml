apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-clone
  labels:
    app: netflix-clone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix-clone
  template:
    metadata:
      labels:
        app: netflix-clone
    spec:
      containers:
        - name: web
          image: shubhamx18/netflix:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          
---

apiVersion: v1
kind: Service
metadata:
  name: netflix-clone
spec:
  type: ClusterIP
  selector:
    app: netflix-clone
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP


